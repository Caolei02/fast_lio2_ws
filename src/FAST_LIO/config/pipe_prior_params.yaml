pipe_prior:
    enable: true
    debug_log: true
    weight_box: 15.0
    weight_axis_align: 4.0
    weight_motion: 2.5
    min_width: 0.22
    max_width: 0.75
    min_height: 0.22
    max_height: 0.75
    axis_conf_threshold: 0.30
    degenerate_min_eig: 1e-4
    degenerate_ratio: 5e-3
    mid_section_keep_ratio: 0.70
    publish_projected_cloud: true
    pcd_save_projected_cloud: true
    wall_snap_max_dist: 0.02
    wall_corner_margin: 0.015
    frame_smooth_alpha: 0.15
    size_smooth_alpha: 0.12
    size_history_len: 60
    min_valid_frames: 10

    max_iteration: 6
    point_filter_num: 1
    feature_extract_enable: false
    runtime_pos_log_enable: 1
    filter_size_corner: 0.02
    filter_size_surf: 0.01
    filter_size_map: 0.015
    cube_side_length: 8.0
