pipe_prior:
    enable: true
    debug_log: true

    weight_box: 8.0
    weight_axis_align: 3.0
    weight_motion: 1.5

    min_width: 0.20
    max_width: 0.40
    min_height: 0.20
    max_height: 0.40
    axis_conf_threshold: 0.50

    degenerate_min_eig: 0.05
    degenerate_ratio: 0.15

    min_confidence: 0.80
    max_motion_res: 0.03
    max_box_res: 0.03
    axis_only_until_stable: true

    min_incidence_cos: 0.30
    apply_incidence_filter_in_lio: true

    enable_intensity_trim: true
    intensity_quantile_low: 0.10
    intensity_quantile_high: 0.90
    debug_print_filter_stats: false

    mid_section_keep_ratio: 0.35

    map_filter_enable: true
    map_mid_section_gate_enable: true
    map_mid_section_keep_ratio: 0.30
    map_cross_section_margin: 0.008
    map_wall_snap_tol: 0.010
    map_min_range: 0.06
    map_max_range: 1.00

    require_geom_for_map_update: true
    require_four_wall_for_map_update: true
    require_balanced_walls: true
    min_wall_samples_strict: 12
    min_wall_balance_ratio: 0.65

    publish_filter_enable: true
    publish_cross_section_margin: 0.008
    publish_wall_snap_tol: 0.010
    publish_mid_section_keep_ratio: 0.30